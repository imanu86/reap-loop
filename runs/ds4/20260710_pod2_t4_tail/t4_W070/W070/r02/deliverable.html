<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean & Brew</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fee; padding: 20px; }
        nav { background: #brown; padding: 10px; text-align: center; }
        nav a { margin: 0 10px; color: white; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        section { text-align: center; margin: 20px 0; }
        h1 { font-size: 2.3rem; }
        button { background: #brown; color: white; border: none; padding: 8px 20px; cursor: pointer; }
        form { margin-top: 20px; padding: 20px; background: white; border-radius: 8px; max-width: 400px; margin: 20px auto; }
        input { display: block; width: 100%; margin: 5px 0; padding: 5px; }
        input[type="submit"] { background: #brown; color: white; border: none; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Contact</a>
    </nav>
    <section>
        <h1>Bean & Brew</h1>
        <p>Freshly roasted, thoughtfully breed, nurtured.</p>
        <button id="order">Order Now</button>
    </section>
    <form action="/submit" id="contactForm">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="submit" value="Submit">
    </form>
    <script>
        document.getElementById("order").addEventListener("click", function() {
            alert("Thank you for your order!");
        });
        document.getElementById("contactForm").addEventListener("submit", function(event) {
            event.preventDefault();
            alert("Confirmation: We will be informed!");
        });
    </script>
</body>
</html>
