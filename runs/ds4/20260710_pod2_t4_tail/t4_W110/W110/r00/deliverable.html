<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean & Brew</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f0e8; color: #2e241f; padding: 20px; }
        nav { background: #3e2c25; padding: 10px; display: flex; gap: 20px; }
        nav a { color: #fff; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        section { margin: 20px 0; }
        h1 { font-size: 2.5rem; }
        button { background: #b86c3f; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        form { background: #fff; padding: 20px; border-radius: 4px; max-width: 300px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        input[type="submit"] { background: #b86c3f; color: #fff; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Contact</a>
    </nav>
    <section>
        <h1>Bean & Brew</h1>
        <p>Freshly roasted, every sip — a cozy coffee.</p>
        <button id="order">Order Now</button>
    </section>
    <form action="/submit">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="submit" value="Submit">
    </form>
    <script>
        document.getElementById("order").addEventListener("click", () => {
            alert("Thank you for your order!");
        });
        document.querySelector("form").onsonsmit, {
            preventDefault: true,
            function() {
                alert("Confirmation: form submitted!");
            }
        }</script>
</body>
</html>
