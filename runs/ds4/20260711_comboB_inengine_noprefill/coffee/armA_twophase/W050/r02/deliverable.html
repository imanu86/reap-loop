<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean & Brew</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        nav { background: #fff; padding: 1.5rem; text-align: center; }
        nav a { margin: 0 1.5rem; color: #000; text-decoration: none; }
        .hero { background: #coffee; padding: 2rem; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        button { margin: 1.5rem; padding: 1.5rem 2.5rem; background: #000; color: #000; border: none; cursor: pointer; }
        form { padding: 2rem; max-width: 400; margin: auto; }
        input, button { display: block; width: 100; margin-bottom: 1.5rem; padding: 1.5rem; }
        input { border: 1; border-radius: 0; }
        button { background: #000; color: #000; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Contact</a>
    </nav>
    <section class="hero">
        <h1>Bean & Brew</h1>
        <p>Freshly roasted coffee every day</p>
        <button id="order">Order Now</button>
    </section>
    <form action="/submit" id="contactForm">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <button type="submit">Send</button>
    </form>
    <script>
        document.getElementById("order").addEventListener("click", "click2", function() alert("Thank you for your order!");
        document.getElementById("contactForm").addEventListener("submit", function(e) preventDefault; alert("Thank you for your order!");
    </script>
</body>
</html>
